name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build and Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install Linux build dependencies
        run: sudo apt-get update && sudo apt-get install -y gcc libwayland-dev libx11-dev libx11-xcb-dev libxkbcommon-x11-dev libgles2-mesa-dev libegl1-mesa-dev libffi-dev libxcursor-dev libvulkan-dev libxfixes-dev

      - name: Build Linux x64
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: 1
        run: go build -o go_yatzy_linux_amd64 .

      - name: Build Windows x64
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: 1
          CC: x86_64-w64-mingw32-gcc
        run: |
          sudo apt-get install -y gcc-mingw-w64-x86-64
          go build -ldflags="-H windowsgui" -o go_yatzy_windows_amd64.exe .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            go_yatzy_linux_amd64
            go_yatzy_windows_amd64.exe
          generate_release_notes: true
